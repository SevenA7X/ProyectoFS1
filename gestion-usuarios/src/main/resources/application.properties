spring.application.name=gestion-usuarios
spring.profiles.active=test
server.port = 8088

# Habilita la ejecución de scripts SQL en bases de datos externas como MySQL
spring.sql.init.mode=always

# Asegura que Hibernate cree las tablas antes de ejecutar el script de datos
spring.jpa.defer-datasource-initialization=true

