spring.application.name=catalogo
spring.datasource.url=jdbc:mysql://localhost:3306/catalogo_db
spring.datasource.username=root
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081

# Habilita la ejecución de scripts SQL en bases de datos externas como MySQL
spring.sql.init.mode=always

# Asegura que Hibernate cree las tablas antes de ejecutar el script de datos
spring.jpa.defer-datasource-initialization=true