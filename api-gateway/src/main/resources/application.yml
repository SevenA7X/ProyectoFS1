server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Catálogo
        - id: catalogo-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/juegos/**, /api/v1/categorias/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 2. Reseñas
        - id: resena-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/resenas/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 3. Moderación
        - id: moderacion-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/moderacion/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 4. Pagos
        - id: pagos-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/pagos/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 5. Compras
        - id: compras-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/compras/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 6. Historial
        - id: historial-compras-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/historial/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 7. Licencias
        - id: licencias-descargas-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/licencias/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 8. Usuarios
        - id: gestion-usuarios-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/usuarios/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 9. Notificaciones
        - id: notificaciones-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notificaciones/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # 10. Estadísticas
        - id: estadisticas-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/estadisticas/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true