server:
  port: 8080

# Configuración del menú desplegable de Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 1. Catálogo
        url: /docs/catalogo
      - name: 2. Reseñas
        url: /docs/resenas
      - name: 3. Moderación
        url: /docs/moderacion
      - name: 4. Pagos
        url: /docs/pagos
      - name: 5. Compras
        url: /docs/compras
      - name: 6. Historial
        url: /docs/historial
      - name: 7. Licencias
        url: /docs/licencias
      - name: 8. Usuarios
        url: /docs/usuarios
      - name: 9. Notificaciones
        url: /docs/notificaciones
      - name: 10. Estadísticas
        url: /docs/estadisticas

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # --- RUTAS DE MICROSERVICIOS (Funcionalidad) ---
        - id: catalogo-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/juegos/**, /api/v1/categorias/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: resena-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/resenas/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: moderacion-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/moderacion/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: pagos-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/pagos/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: compras-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/compras/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: historial-compras-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/historial/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: licencias-descargas-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/licencias/**, /api/v1/descargas/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: gestion-usuarios-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/usuarios/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: notificaciones-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notificaciones/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true
        - id: estadisticas-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/estadisticas/**
          filters:
            - AddRequestHeader=X-Gateway-Routed, true

        # --- RUTAS INTERNAS PARA EXTRACCIÓN DE SWAGGER ---
        - id: docs-catalogo
          uri: http://localhost:8081
          predicates:
            - Path=/docs/catalogo
          filters:
            - RewritePath=/docs/catalogo, /v3/api-docs
        - id: docs-resenas
          uri: http://localhost:8082
          predicates:
            - Path=/docs/resenas
          filters:
            - RewritePath=/docs/resenas, /v3/api-docs
        - id: docs-moderacion
          uri: http://localhost:8083
          predicates:
            - Path=/docs/moderacion
          filters:
            - RewritePath=/docs/moderacion, /v3/api-docs
        - id: docs-pagos
          uri: http://localhost:8084
          predicates:
            - Path=/docs/pagos
          filters:
            - RewritePath=/docs/pagos, /v3/api-docs
        - id: docs-compras
          uri: http://localhost:8085
          predicates:
            - Path=/docs/compras
          filters:
            - RewritePath=/docs/compras, /v3/api-docs
        - id: docs-historial
          uri: http://localhost:8086
          predicates:
            - Path=/docs/historial
          filters:
            - RewritePath=/docs/historial, /v3/api-docs
        - id: docs-licencias
          uri: http://localhost:8087
          predicates:
            - Path=/docs/licencias
          filters:
            - RewritePath=/docs/licencias, /v3/api-docs
        - id: docs-usuarios
          uri: http://localhost:8088
          predicates:
            - Path=/docs/usuarios
          filters:
            - RewritePath=/docs/usuarios, /v3/api-docs
        - id: docs-notificaciones
          uri: http://localhost:8089
          predicates:
            - Path=/docs/notificaciones
          filters:
            - RewritePath=/docs/notificaciones, /v3/api-docs
        - id: docs-estadisticas
          uri: http://localhost:8090
          predicates:
            - Path=/docs/estadisticas
          filters:
            - RewritePath=/docs/estadisticas, /v3/api-docs